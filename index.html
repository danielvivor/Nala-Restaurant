<!doctype html>
<html lang="en-US">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO: Search engine description -->
    <meta name="description"
        content="Experience authentic intercontinental cuisine in Munich made from fresh, locally sourced ingredients. Enjoy global flavors and gourmet dishes." />

    <!-- SEO: Keywords -->
    <meta name="keywords"
        content="intercontinental restaurant Munich, global cuisine, international dishes, fine dining Munich, Nala Restaurant" />

    <!-- Social sharing: Open Graph -->
    <meta property="og:title" content="Nala Restaurant | Global Flavors in Munich" />
    <meta property="og:description"
        content="Discover a world of taste with our intercontinental menu featuring dishes inspired by Europe, Asia, Africa, and the Americas." />
    <meta property="og:type" content="restaurant" />
    <meta property="og:locale" content="en_US" />

    <!-- Social sharing: Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Nala Restaurant - Taste the World" />
    <meta name="twitter:description"
        content="Enjoy a curated selection of intercontinental dishes crafted by expert chefs in Munich." />

    <!-- Title -->
    <title>Nala Restaurant</title>

    <!-- Favicons -->

    <!-- for iOS -->
    <link rel="apple-touch-icon" sizes="180x180" href="assets/favicons/apple-touch-icon.png" />

    <!-- standard -->
    <link rel="icon" type="image/x-icon" href="assets/favicons/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicons/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicons/favicon-32x32.png" />

    <!-- for Android/Chrome -->
    <link rel="icon" type="image/png" sizes="192x192" href="assets/favicons/android-chrome-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="assets/favicons/android-chrome-512x512.png" />

    <!-- web manifest -->
    <link rel="manifest" href="assets/favicons/site.webmanifest" />

    <!-- Stylesheet -->
    <link rel="stylesheet" href="assets/css/styles.css" />

    <!-- Structured Data (helps Google understand the business) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Restaurant",
        "name": "Nala Restaurant",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "123 Gold Street",
          "addressLocality": "Munich",
          "postalCode": "80331",
          "addressCountry": "DE"
        },
        "servesCuisine": "International, Intercontinental, Fusion",
        "url": "https://www.example.com/",
        "telephone": "+49-000-000000",
        "openingHours": ["Wed-Fri 10:00-22:00", "Sat-Sun 12:00-00:00"]
      }
    </script>
</head>

<body>

    <!-- Accessibility: Skip link for screen readers -->
    <a class="skip-link" href="#main-content">Skip to main content</a>

    <div class="page-wrapper">

        <!-- Header -->
    <header>

        <a href="index.html" class="logo-container" aria-label="Nala Restaurant Home">
            <img src="assets/images/logo.png" id="logo-img" alt="Nala Restaurant logo" />
            <p class="logo-text">Nala Restaurant</p>
        </a>
    </header>

    <!-- Mian Section -->
    <main></main>

    <!-- Footer -->
    <footer></footer>

    </div>

    <!-- Font Awesome + main.js -->
    <script src="https://kit.fontawesome.com/32ee7b6f29.js" crossorigin="anonymous"></script>
    <script src="assets/javascript/"></script>
</body>

</html>
